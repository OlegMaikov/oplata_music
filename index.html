<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Оплата успешна</title>
    <style>
      :root {
        --primary-color: #007AFF;
        --success-color: #10B981;
        --bg-color: #F3F4F6;
        --card-bg: #FFFFFF;
        --text-main: #1F2937;
        --text-muted: #4B5563;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        text-align: center;
        padding: 16px;
        box-sizing: border-box;
      }

      .card {
        background: var(--card-bg);
        padding: 32px 24px;
        border-radius: 24px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        width: 100%;
        max-width: 440px;
        box-sizing: border-box;
      }

      .icon-container {
        width: 72px;
        height: 72px;
        background-color: #ECFDF5;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px auto;
      }

      .icon-success {
        color: var(--success-color);
        width: 40px;
        height: 40px;
      }

      h1 {
        color: var(--text-main);
        margin: 0 0 12px 0;
        font-size: 24px;
        font-weight: 800;
        line-height: 1.2;
      }

      p {
        color: var(--text-muted);
        line-height: 1.6;
        margin: 0 0 32px 0;
        font-size: 16px;
      }

      .btn {
        display: block;
        width: 100%;
        background-color: var(--primary-color);
        color: white;
        text-decoration: none;
        padding: 16px 24px;
        border-radius: 16px;
        font-weight: 600;
        font-size: 16px;
        box-sizing: border-box;
        transition: all 0.2s ease;
        box-shadow: 0 4px 12px rgba(0, 122, 255, 0.25);
      }

      .btn:hover {
        background-color: #0062CC;
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(0, 122, 255, 0.35);
      }

      .btn:active {
        transform: translateY(1px);
        box-shadow: 0 2px 6px rgba(0, 122, 255, 0.2);
      }

      .footer-text {
        font-size: 12px;
        color: #9CA3AF;
        margin-top: 24px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon-container">
        <!-- SVG галочки успеха -->
        <svg class="icon-success" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
      
      <h1>Оплата успешно завершена!</h1>
      <p>Спасибо! Баланс вашего личного кабинета успешно пополнен на 10 нот. Вы будете перенаправлены в приложение автоматически.</p>
      
      <!-- Ссылки ведут на наши deep link схемы, которые перехватит MainActivity -->
      <a href="neuromusic://pay/success" id="returnButton" class="btn">Вернуться в приложение</a>
      
      <div class="footer-text">
        Если приложение не открылось автоматически, нажмите кнопку выше.
      </div>
    </div>

    <script>
      // Список deep link адресов для максимальной совместимости
      const deepLinks = [
        "neuromusic://pay/success",
        "yourapp://pay/success"
      ];

      // Функция автоперенаправления при загрузке страницы
      function tryToRedirect() {
        let index = 0;
        
        function next() {
          if (index < deepLinks.length) {
            window.location.href = deepLinks[index];
            index++;
            setTimeout(next, 500); // Пробуем следующую схему через 500мс, если первая не сработала
          }
        }
        
        next();
      }

      // Запускаем перенаправление при загрузке
      window.onload = function() {
        tryToRedirect();
      };

      // Дублируем обработчик на кнопке на случай блокировок браузером
      document.getElementById("returnButton").addEventListener("click", function(e) {
        // Мы даем браузеру выполнить переход по умолчанию на neuromusic://pay/success,
        // но на всякий случай дублируем в JS.
        setTimeout(function() {
          window.location.href = "yourapp://pay/success";
        }, 300);
      });
    </script>
  </body>
</html>
